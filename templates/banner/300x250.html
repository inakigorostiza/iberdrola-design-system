<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iberdrola · 300×250 Medium Rectangle</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap");
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#c9ccc5; }
  .ad {
    width:300px; height:250px; overflow:hidden; position:relative;
    background:#013D28; background-image:linear-gradient(155deg,#006B33 0%,#013D28 100%);
    font-family:"Figtree","Segoe UI",system-ui,sans-serif; color:#fff;
    border-radius:16px;
  }
  .ad__tricolor { position:absolute; top:0; left:0; right:0; height:5px; display:flex; }
  .ad__tricolor i { display:block; height:100%; }
  .ad__tricolor i:nth-child(1){ flex:42; background:#00A443; }
  .ad__tricolor i:nth-child(2){ flex:33; background:#0DA9FF; }
  .ad__tricolor i:nth-child(3){ flex:25; background:#FF9C1A; }
  .ad__inner { position:absolute; inset:0; padding:26px 24px 24px; display:flex; flex-direction:column; }
  .ad__logo { height:34px; filter:brightness(0) invert(1); }
  .ad__flame { position:absolute; right:-18px; bottom:-14px; width:150px; opacity:.9; }
  .ad__badge { display:inline-block; align-self:flex-start; margin-top:20px; font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:#013D28; background:#FF9C1A; border-radius:999px; padding:4px 11px; }
  .ad__h { position:relative; margin-top:12px; font-size:24px; line-height:27px; font-weight:700; letter-spacing:-.5px; max-width:220px; }
  .ad__cta { position:relative; align-self:flex-start; margin-top:auto; background:#fff; color:#00823A; font-size:14px; font-weight:700; padding:11px 22px; border-radius:999px; }
</style>
</head>
<body>
<div class="ad" role="img" aria-label="Iberdrola — La energía que cuida de ti. Contrata online.">
  <span class="ad__tricolor"><i></i><i></i><i></i></span>
  <img class="ad__flame" src="../../brand/logos/iberdrola-icon.svg" alt="">
  <div class="ad__inner">
    <img class="ad__logo" src="../../brand/logos/iberdrola-logo-mono.svg" alt="Iberdrola">
    <span class="ad__badge">Plan Online</span>
    <h1 class="ad__h">La energía que cuida de ti</h1>
    <span class="ad__cta">Contrata online →</span>
  </div>
</div>
</body>
</html>
