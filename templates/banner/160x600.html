<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iberdrola · 160×600 Wide Skyscraper</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap");
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#c9ccc5; }
  .ad {
    width:160px; height:600px; overflow:hidden; position:relative;
    background:#013D28; background-image:linear-gradient(180deg,#006B33 0%,#013D28 60%);
    font-family:"Figtree","Segoe UI",system-ui,sans-serif; color:#fff;
    border-radius:16px;
  }
  .ad__tricolor { position:absolute; top:0; left:0; right:0; height:5px; display:flex; }
  .ad__tricolor i { display:block; height:100%; }
  .ad__tricolor i:nth-child(1){ flex:42; background:#00A443; }
  .ad__tricolor i:nth-child(2){ flex:33; background:#0DA9FF; }
  .ad__tricolor i:nth-child(3){ flex:25; background:#FF9C1A; }
  .ad__inner { position:absolute; inset:0; padding:28px 20px 26px; display:flex; flex-direction:column; align-items:flex-start; }
  .ad__logo { height:32px; filter:brightness(0) invert(1); }
  .ad__badge { display:inline-block; margin-top:26px; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#013D28; background:#FF9C1A; border-radius:999px; padding:4px 10px; }
  .ad__h { margin-top:16px; font-size:27px; line-height:30px; font-weight:700; letter-spacing:-.6px; }
  .ad__p { margin-top:12px; font-size:13px; line-height:19px; color:#D9E5DE; }
  .ad__flame { width:96px; margin:22px 0 0 -6px; }
  .ad__cta { align-self:stretch; text-align:center; margin-top:auto; background:#fff; color:#00823A; font-size:14px; font-weight:700; padding:13px 10px; border-radius:999px; }
</style>
</head>
<body>
<div class="ad" role="img" aria-label="Iberdrola — La energía que cuida de tu bienestar. Plan Online. Contrata online.">
  <span class="ad__tricolor"><i></i><i></i><i></i></span>
  <div class="ad__inner">
    <img class="ad__logo" src="../../brand/logos/iberdrola-logo-mono.svg" alt="Iberdrola">
    <span class="ad__badge">Plan Online</span>
    <h1 class="ad__h">La energía que cuida de ti</h1>
    <p class="ad__p">100% renovable · Sin permanencia · Precio estable 12 meses.</p>
    <img class="ad__flame" src="../../brand/logos/iberdrola-icon.svg" alt="">
    <span class="ad__cta">Contrata online</span>
  </div>
</div>
</body>
</html>
