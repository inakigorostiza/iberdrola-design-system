<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iberdrola · 1080×1080 Square Social</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap");
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#c9ccc5; }
  .ad {
    width:1080px; height:1080px; overflow:hidden; position:relative;
    background:#013D28; background-image:linear-gradient(160deg,#006B33 0%,#013D28 68%);
    font-family:"Figtree","Segoe UI",system-ui,sans-serif; color:#fff;
  }
  .ad__tricolor { position:absolute; top:0; left:0; right:0; height:14px; display:flex; }
  .ad__tricolor i { display:block; height:100%; }
  .ad__tricolor i:nth-child(1){ flex:42; background:#00A443; }
  .ad__tricolor i:nth-child(2){ flex:33; background:#0DA9FF; }
  .ad__tricolor i:nth-child(3){ flex:25; background:#FF9C1A; }
  .ad__flame { position:absolute; right:-70px; bottom:-90px; width:640px; opacity:.92; }
  .ad__inner { position:absolute; inset:0; padding:96px 100px 100px; display:flex; flex-direction:column; align-items:flex-start; }
  .ad__logo { height:96px; filter:brightness(0) invert(1); }
  .ad__badge { display:inline-block; margin-top:80px; font-size:24px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:#013D28; background:#FF9C1A; border-radius:999px; padding:12px 30px; }
  .ad__h { position:relative; margin-top:36px; font-size:96px; line-height:100px; font-weight:700; letter-spacing:-2.5px; max-width:840px; }
  .ad__h span { color:#FF9C1A; }
  .ad__p { position:relative; margin-top:32px; font-size:34px; line-height:46px; color:#D9E5DE; max-width:720px; }
  .ad__cta { position:relative; margin-top:auto; background:#fff; color:#00823A; font-size:38px; font-weight:700; padding:34px 68px; border-radius:999px; }
</style>
</head>
<body>
<div class="ad" role="img" aria-label="Iberdrola — La energía que cuida de tu bienestar. Plan Online 100% renovable. Contrata online.">
  <span class="ad__tricolor"><i></i><i></i><i></i></span>
  <img class="ad__flame" src="../../brand/logos/iberdrola-icon.svg" alt="">
  <div class="ad__inner">
    <img class="ad__logo" src="../../brand/logos/iberdrola-logo-mono.svg" alt="Iberdrola">
    <span class="ad__badge">Plan Online</span>
    <h1 class="ad__h">La energía que cuida de tu <span>bienestar</span></h1>
    <p class="ad__p">100% renovable · Sin permanencia · Precio estable durante 12 meses.</p>
    <span class="ad__cta">Contrata online →</span>
  </div>
</div>
</body>
</html>
