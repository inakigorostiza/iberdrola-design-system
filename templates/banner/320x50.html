<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iberdrola · 320×50 Mobile Banner</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap");
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#c9ccc5; }
  .ad {
    width:320px; height:50px; overflow:hidden; position:relative;
    background:#013D28; background-image:linear-gradient(120deg,#006B33 0%,#013D28 100%);
    font-family:"Figtree","Segoe UI",system-ui,sans-serif; color:#fff;
    display:flex; align-items:center; border-radius:8px;
  }
  .ad__tricolor { position:absolute; top:0; bottom:0; left:0; width:4px; display:flex; flex-direction:column; }
  .ad__tricolor i { display:block; width:100%; }
  .ad__tricolor i:nth-child(1){ flex:42; background:#00A443; }
  .ad__tricolor i:nth-child(2){ flex:33; background:#0DA9FF; }
  .ad__tricolor i:nth-child(3){ flex:25; background:#FF9C1A; }
  .ad__logo { height:22px; margin-left:14px; filter:brightness(0) invert(1); }
  .ad__h { flex:1; margin-left:12px; font-size:13px; line-height:15px; font-weight:600; }
  .ad__h b { color:#FF9C1A; font-weight:700; }
  .ad__cta { margin-right:10px; white-space:nowrap; background:#fff; color:#00823A; font-size:12px; font-weight:700; padding:8px 15px; border-radius:999px; }
</style>
</head>
<body>
<div class="ad" role="img" aria-label="Iberdrola — Plan Online: energía 100% verde. Contrata.">
  <span class="ad__tricolor"><i></i><i></i><i></i></span>
  <img class="ad__logo" src="../../brand/logos/iberdrola-logo-mono.svg" alt="Iberdrola">
  <div class="ad__h">Energía <b>100% verde</b><br>sin permanencia</div>
  <span class="ad__cta">Contrata</span>
</div>
</body>
</html>
