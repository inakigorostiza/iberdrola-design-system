<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iberdrola · 728×90 Leaderboard</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap");
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#c9ccc5; }
  .ad {
    width:728px; height:90px; overflow:hidden; position:relative;
    background:#FFFFFF; font-family:"Figtree","Segoe UI",system-ui,sans-serif; color:#1A1A1A;
    border-radius:12px; display:flex; align-items:center; border:1px solid #E1E3DE;
  }
  .ad__tricolor { position:absolute; top:0; bottom:0; left:0; width:6px; display:flex; flex-direction:column; }
  .ad__tricolor i { display:block; width:100%; }
  .ad__tricolor i:nth-child(1){ flex:42; background:#00A443; }
  .ad__tricolor i:nth-child(2){ flex:33; background:#0DA9FF; }
  .ad__tricolor i:nth-child(3){ flex:25; background:#FF9C1A; }
  .ad__logo { height:44px; margin-left:30px; }
  .ad__divider { width:1px; height:46px; background:#E1E3DE; margin:0 26px; }
  .ad__text { flex:1; }
  .ad__badge { display:inline-block; font-size:10px; font-weight:700; letter-spacing:1.1px; text-transform:uppercase; color:#00823A; }
  .ad__h { font-size:22px; line-height:26px; font-weight:700; letter-spacing:-.4px; color:#1A1A1A; }
  .ad__h span { color:#00A443; }
  .ad__cta { margin:0 28px; white-space:nowrap; background:#00A443; color:#fff; font-size:15px; font-weight:700; padding:13px 28px; border-radius:999px; }
</style>
</head>
<body>
<div class="ad" role="img" aria-label="Iberdrola — Plan Online: energía 100% verde sin permanencia. Contrata online.">
  <span class="ad__tricolor"><i></i><i></i><i></i></span>
  <img class="ad__logo" src="../../brand/logos/iberdrola-logo-full.svg" alt="Iberdrola">
  <span class="ad__divider"></span>
  <div class="ad__text">
    <span class="ad__badge">Plan Online</span>
    <div class="ad__h">Energía <span>100% verde</span>, sin permanencia</div>
  </div>
  <span class="ad__cta">Contrata online →</span>
</div>
</body>
</html>
