<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-es="Área de Clientes — Iberdrola" data-i18n-en="Customer Area — Iberdrola">Área de Clientes — Iberdrola</title>
<meta name="description" data-i18n-es-content="Accede a tu Área de Clientes de Iberdrola." data-i18n-en-content="Access your Iberdrola Customer Area." content="Accede a tu Área de Clientes de Iberdrola.">
<link rel="icon" href="../../brand/logos/iberdrola-icon.svg">
<link rel="stylesheet" href="../../css/iberdrola.css">
<script src="../../js/analytics.js"></script>
<script src="../../js/i18n.js"></script>
<style>
  body{ min-height:100vh; display:grid; place-items:center; position:relative; overflow:hidden; padding:var(--ib-space-5); }
  .lg-bg, .lg-bg video, .lg-bg img{ position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:-2; }
  .lg-bg::after{ content:""; position:fixed; inset:0; z-index:-1;
    background:linear-gradient(120deg, rgba(1,61,40,.92) 0%, rgba(1,61,40,.78) 55%, rgba(1,61,40,.55) 100%); }
  .lg-card{ width:100%; max-width:430px; background:rgba(255,255,255,.97); backdrop-filter:blur(8px);
    border-radius:var(--ib-radius-xl); box-shadow:var(--ib-shadow-lg); padding:clamp(1.75rem, 1.25rem + 2vw, 2.75rem); position:relative; z-index:1;
    animation:lgIn .6s var(--ib-ease-decelerate) both; }
  @keyframes lgIn{ from{ opacity:0; transform:translateY(20px) } }
  .lg-card__logo{ height:44px; margin-bottom:var(--ib-space-5); }
  .lg-card h1{ font-size:var(--ib-text-h3); }
  .lg-field{ display:flex; flex-direction:column; gap:var(--ib-space-2); margin-top:var(--ib-space-4); }
  .lg-error{ display:none; align-items:center; gap:8px; margin-top:var(--ib-space-4);
    background:#FDECEA; color:#7A1A12; border-radius:var(--ib-radius-md); padding:.7em 1em; font-size:var(--ib-text-body-sm); }
  .lg-error.show{ display:flex; }
  .lg-hints{ margin-top:var(--ib-space-6); border-top:1px solid var(--ib-border); padding-top:var(--ib-space-4); }
  .lg-hints summary{ cursor:pointer; font-weight:var(--ib-weight-semibold); font-size:var(--ib-text-body-sm); color:var(--ib-color-primary); }
  .lg-hints table{ width:100%; border-collapse:collapse; margin-top:var(--ib-space-3); font-size:var(--ib-text-caption); }
  .lg-hints td{ padding:5px 6px; border-top:1px solid var(--ib-border); vertical-align:top; }
  .lg-hints code{ font-size:.72rem; cursor:pointer; }
  .lg-hints tr:hover{ background:var(--ib-green-50); }
  .lg-back{ position:fixed; top:var(--ib-space-5); left:var(--ib-space-5); z-index:2; color:#fff; display:inline-flex; align-items:center; gap:8px; font-weight:var(--ib-weight-medium); }
  .lg-back img{ height:34px; }
</style>
</head>
<body>
  <div class="lg-bg" aria-hidden="true">
    <video autoplay muted loop playsinline poster="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1600&q=80&auto=format&fit=crop">
      <source src="https://videos.pexels.com/video-files/2098989/2098989-hd_1920_1080_30fps.mp4" type="video/mp4">
    </video>
  </div>
  <a class="lg-back" href="index.html"><img src="../../brand/logos/iberdrola-logo-mono.svg" alt="Iberdrola" style="filter:brightness(0) invert(1)"> <span data-i18n-es="Volver" data-i18n-en="Back">Volver</span></a>
  <span class="ib-lang ib-lang--on-dark"><button type="button" data-set-lang="es">ES</button><button type="button" data-set-lang="en">EN</button></span>

  <div class="lg-card">
    <img class="lg-card__logo" src="../../brand/logos/iberdrola-logo-full.svg" alt="Iberdrola">
    <span class="ib-overline" data-i18n-es="Área de Clientes" data-i18n-en="Customer Area">Área de Clientes</span>
    <h1 style="margin:var(--ib-space-2) 0 var(--ib-space-1)" data-i18n-es="Accede a tu cuenta" data-i18n-en="Access your account">Accede a tu cuenta</h1>
    <p class="ib-text-muted ib-body-sm" data-i18n-es="Tu energía, personalizada para ti." data-i18n-en="Your energy, personalized for you.">Tu energía, personalizada para ti.</p>

    <form id="lg-form" novalidate>
      <div class="lg-field">
        <label class="ib-label" for="lg-user" data-i18n-es="Usuario" data-i18n-en="User">Usuario</label>
        <input class="ib-input" id="lg-user" name="user" autocomplete="username" placeholder="tu usuario" data-i18n-es-placeholder="tu usuario" data-i18n-en-placeholder="your username" required>
      </div>
      <div class="lg-field">
        <label class="ib-label" for="lg-pass" data-i18n-es="Contraseña" data-i18n-en="Password">Contraseña</label>
        <input class="ib-input" id="lg-pass" name="pass" type="password" autocomplete="current-password" placeholder="tu contraseña" data-i18n-es-placeholder="tu contraseña" data-i18n-en-placeholder="your password" required>
      </div>
      <div class="lg-error" id="lg-error" role="alert">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        <span data-i18n-es="Usuario o contraseña incorrectos." data-i18n-en="Incorrect username or password.">Usuario o contraseña incorrectos.</span>
      </div>
      <label class="ib-check" style="margin-top:var(--ib-space-4)"><input type="checkbox" checked> <span data-i18n-es="Mantener sesión iniciada" data-i18n-en="Keep me signed in">Mantener sesión iniciada</span></label>
      <button class="ib-btn ib-btn--lg ib-btn--block" type="submit" style="margin-top:var(--ib-space-5)" data-i18n-es="Entrar" data-i18n-en="Sign in">Entrar</button>
    </form>

    <details class="lg-hints">
      <summary data-i18n-es="Usuarios de demostración" data-i18n-en="Demo users">Usuarios de demostración</summary>
      <table id="lg-hint-table"></table>
      <p class="ib-caption" style="margin-top:8px" data-i18n-es="Demo de hiperpersonalización · no es un login real. Haz clic en un usuario para autocompletar." data-i18n-en="Hyper-personalization demo · not a real login. Click a user to autofill.">Demo de hiperpersonalización · no es un login real. Haz clic en un usuario para autocompletar.</p>
    </details>
  </div>

  <script src="../../js/profiles.js"></script>
  <script>
    (function () {
      var hints = window.IB_DEMO_HINTS || [];
      var tbl = document.getElementById("lg-hint-table");
      tbl.innerHTML = hints.map(function (h) {
        var w = (window.IB_LANG === 'en' && h.who_en) ? h.who_en : h.who;
        return '<tr data-u="' + h.user + '" data-p="' + h.pass + '"><td><code><b>' + h.user + '</b> / ' + h.pass + '</code></td><td class="ib-text-muted">' + w + '</td></tr>';
      }).join("");
      tbl.addEventListener("click", function (e) {
        var tr = e.target.closest("tr"); if (!tr) return;
        document.getElementById("lg-user").value = tr.getAttribute("data-u");
        document.getElementById("lg-pass").value = tr.getAttribute("data-p");
      });
      document.getElementById("lg-form").addEventListener("submit", function (e) {
        e.preventDefault();
        var u = document.getElementById("lg-user").value.trim().toLowerCase();
        var p = document.getElementById("lg-pass").value;
        var cred = (window.IB_CREDENTIALS || {})[u];
        if (cred && cred.pass === p) {
          sessionStorage.setItem("ib_user", cred.key);
          sessionStorage.removeItem("ib_suppress");
          if (window.IB_identify) window.IB_identify(window.IB_PROFILES[cred.key]);
          window.location.href = "index.html";
        } else {
          document.getElementById("lg-error").classList.add("show");
        }
      });
    })();
  </script>
</body>
</html>
